<!DOCTYPE html>
<html>
<head> 
    <title> click </title>

<style>

body {
margin: 0%;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow: hidden;
}

.ui{
position: relative;
width: 1024px;

}

.bg {

.home{

}
.home:hover{

}

<body>

<img src="back.png" class="home" onclick="window.location.href='Untitled-1.html'">

   <video controls style="max-width:57%; border-radius:20px; position: absolute; top: 30%;left: 23%;z-index: 5;">

  </video>
</div>


</body>
